# One-shot real stack + API: npm run dev:stack
# Backend only (expects Postgres already): npm run dev
# No DB: STUB_DATABASE=true npm run dev  or  npm run dev:stub
services:
  postgres:
    image: postgres:16-alpine
    container_name: ai-sql-assistant-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_sql_assistant
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_sql_assistant"]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 5s
  ollama:
    image: ollama/ollama:latest
    container_name: ai-sql-assistant-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  postgres_data:
  ollama_data:
